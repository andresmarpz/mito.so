version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mito-postgres
    environment:
      POSTGRES_DB: mito
      POSTGRES_USER: mito_user
      POSTGRES_PASSWORD: mito_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mito_user -d mito"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
